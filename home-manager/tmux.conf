set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator ""

set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_pane_active_border_style "fg=#{@thm_lavender}"

set -g @catppuccin_date_time_text "%m-%d %H:%M:%S"

set -gF window-status-style "bg=#{@thm_surface_1},fg=#{@thm_fg}"
set -gF window-status-current-style "bg=#{@thm_lavender},fg=#{@thm_crust}"
set -g @catppuccin_pane_active_border_style "fg=#{@thm_lavender}" # Use a value compatible with the standard tmux 'pane-border-active-style'
set -g @catppuccin_menu_selected_style "fg=#{@thm_surface_0},bg=#{@thm_lavender}" # Use a value compatible with the standard tmux `menu-selected-style`

set -g window-status-format " #T | #I "
set -g window-status-current-format " #T | #I "

set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_battery}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -ag status-right "#{E:@catppuccin_status_date_time}"
